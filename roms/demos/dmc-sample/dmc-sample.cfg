# NROM-128 layout with a dedicated SAMPLE segment so the DMC
# sample bytes can live at a fixed PRG address ($F000) that the
# $4012 sample-address register can point at.

MEMORY {
    HEADER:  start=$00,    size=$0010,  fill=yes;
    PRG:     start=$C000,  size=$3000,  fill=yes, fillval=$00;
    SAMPLE:  start=$F000,  size=$0FFA,  fill=yes, fillval=$00;
    VECTORS: start=$FFFA,  size=$0006;
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
    ZP:      start=$00,    size=$0100;
}

SEGMENTS {
    ZEROPAGE: load=ZP, type=zp;
    HEADER:   load=HEADER;
    CODE:     load=PRG;
    SAMPLE:   load=SAMPLE;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
