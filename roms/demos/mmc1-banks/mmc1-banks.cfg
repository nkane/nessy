# MMC1 (mapper 1) layout, PRG mode 3 (fix last bank at $C000).
# Two 16 KiB PRG banks. Bank 0 is switchable, mapped at $8000-$BFFF
# when prgBank=0. Bank 1 is the fixed bank, always mapped at
# $C000-$FFFF — it holds the reset / NMI code AND the reset / NMI /
# IRQ vectors at $FFFA-$FFFF. The cart loader reads PRGBanks × 16 KiB
# from the file, so the BANK0 + (FIXED+VECTORS) segments together
# must fill exactly 32 KiB; no separate "vectors" memory region.

MEMORY {
    HEADER:  start=$00,    size=$0010,  fill=yes;
    BANK0:   start=$8000,  size=$4000,  fill=yes, fillval=$00;
    BANK1:   start=$C000,  size=$3FFA,  fill=yes, fillval=$00;
    VECTORS: start=$FFFA,  size=$0006;
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
    ZP:      start=$00,    size=$0100;
}

SEGMENTS {
    ZEROPAGE: load=ZP,      type=zp;
    HEADER:   load=HEADER;
    BANK0:    load=BANK0;
    BANK1:    load=BANK1;
    FIXED:    load=BANK1;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
