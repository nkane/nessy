# ld65 linker config for the audio-test NROM-128 demo. Mirrors the
# vblank-bounce layout — same NROM-128 PRG/CHR + ZP slice for the
# tiny note-index / frame-counter state.

MEMORY {
    HEADER:  start=$00,    size=$0010,  fill=yes;
    PRG:     start=$C000,  size=$3FFA,  fill=yes, fillval=$00;
    VECTORS: start=$FFFA,  size=$0006;
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
    ZP:      start=$00,    size=$0100;
}

SEGMENTS {
    ZEROPAGE: load=ZP, type=zp;
    HEADER:   load=HEADER;
    CODE:     load=PRG;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
