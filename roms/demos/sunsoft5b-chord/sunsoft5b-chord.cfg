# FME-7 / Sunsoft 5B layout — 16 KiB PRG = 2 × 8 KiB banks. Bank 0
# at $8000-$9FFF is unused (the cart's $8000 / $A000 / $C000 windows
# all power up reading from bank 0 — fine for a demo that never
# touches those addresses for code). Fixed last bank at $E000-$FFFF
# carries the reset + NMI code + vectors.
#
# Both FIXED + VECTORS load into the same physical 8 KiB block
# (bank 1). Same gotcha as mmc1-banks: separate VECTORS MEMORY
# region would silently overflow the 16 KiB PRG envelope.

MEMORY {
    HEADER:  start=$00,    size=$0010,  fill=yes;
    BANK0:   start=$8000,  size=$2000,  fill=yes, fillval=$00;
    FIXED:   start=$E000,  size=$1FFA,  fill=yes, fillval=$00;
    VECTORS: start=$FFFA,  size=$0006;
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
    ZP:      start=$00,    size=$0100;
}

SEGMENTS {
    ZEROPAGE: load=ZP,      type=zp;
    HEADER:   load=HEADER;
    BANK0:    load=BANK0;
    FIXED:    load=FIXED;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
