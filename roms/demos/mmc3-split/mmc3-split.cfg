# MMC3 (mapper 4) layout — 32 KiB PRG = 4 × 8 KiB banks. Code +
# vectors live in the fixed last bank ($E000-$FFFF). Banks 0-2 are
# unused filler. The cart maps the last 8 KiB to $E000 always
# (MMC3 PRG mode 0), so reset/IRQ/NMI run from FIXED.

MEMORY {
    HEADER:  start=$00,    size=$0010,  fill=yes;
    ROM012:  start=$8000,  size=$6000,  fill=yes, fillval=$00;  # banks 0-2 (24 KiB), unused
    FIXED:   start=$E000,  size=$1FFA,  fill=yes, fillval=$00;  # bank 3 (last), code
    VECTORS: start=$FFFA,  size=$0006;
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
    ZP:      start=$00,    size=$0100;
}

SEGMENTS {
    ZEROPAGE: load=ZP,      type=zp;
    HEADER:   load=HEADER;
    ROM012:   load=ROM012;
    FIXED:    load=FIXED;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
