# ld65 linker config for the hello-bg NROM-128 demo.
#
# NROM-128 layout: 16 KiB PRG-ROM mapped at $C000-$FFFF on the CPU bus,
# 8 KiB CHR-ROM mapped at $0000-$1FFF on the PPU bus. NROM has no
# bank switching and no battery RAM. The cart writes are no-ops.

MEMORY {
    # iNES header (16 bytes), written verbatim as the first segment in
    # the .nes output file.
    HEADER:  start=$00,    size=$0010,  fill=yes;

    # 16 KiB PRG-ROM. The reset / NMI / IRQ vectors live in the last
    # 6 bytes ($FFFA-$FFFF); CODE fills the rest from $C000 up.
    PRG:     start=$C000,  size=$3FFA,  fill=yes, fillval=$00;
    VECTORS: start=$FFFA,  size=$0006;

    # 8 KiB CHR-ROM, written as the last segment in the .nes output.
    CHR:     start=$0000,  size=$2000,  fill=yes, fillval=$00;
}

SEGMENTS {
    HEADER:   load=HEADER;
    CODE:     load=PRG;
    VECTORS:  load=VECTORS;
    CHARS:    load=CHR;
}
